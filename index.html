<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berkah Kajeng - Sistem Akuntansi Kayu</title>
    <meta name="description" content="Aplikasi manajemen dan akuntansi kayu gelondongan untuk pangkalan kayu Berkah Kajeng." />
    <meta name="author" content="Berkah Kajeng" />
    <meta name="theme-color" content="#18181b" />

    <!-- Performance: Preconnect to font origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Load async to prevent render-blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Critical inline styles for instant FCP -->
    <style>
      body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .app-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa;z-index:9999}
      @media(prefers-color-scheme:dark){.app-loader{background:#09090b}}
      .app-loader svg{width:48px;height:48px;animation:spin 1s linear infinite}
      .app-loader p{margin-top:12px;font-weight:600;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#71717a}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loader" id="app-loader">
        <svg viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <p>Memuat Sistem</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
