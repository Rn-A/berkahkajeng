<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berkah Kajeng - Sistem Akuntansi Kayu</title>
    <meta name="description" content="Aplikasi manajemen dan akuntansi kayu gelondongan untuk pangkalan kayu Berkah Kajeng." />
    <meta name="author" content="Berkah Kajeng" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Berkah Kajeng - Sistem Akuntansi Kayu" />
    <meta property="og:description" content="Aplikasi manajemen dan akuntansi kayu gelondongan untuk pangkalan kayu Berkah Kajeng." />
    <meta property="og:image" content="/logo.png" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/logo.png" as="image" />
    <link rel="preload" href="/src/main.tsx" as="script" crossorigin />

    <!-- Performance: Preconnect to font origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Load with swap display to prevent render-blocking -->
    <link 
      rel="stylesheet" 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" 
      media="print" 
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Critical inline styles for instant FCP -->
    <style>
      body { margin: 0; background: #fafafa; }
      @media (prefers-color-scheme: dark) { body { background: #09090b; } }
      #root { min-height: 100vh; }
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e4e4e7;
        border-top-color: #18181b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .loader-spinner { border-color: #27272a; border-top-color: #fafafa; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader" id="app-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
